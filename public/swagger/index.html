<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visual Law - Swagger</title>
    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" />
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f2f2f7;
      }
      .notice {
        max-width: 1100px;
        margin: 1rem auto 0;
        padding: 0.75rem 1rem;
        border: 1px solid #d7d7db;
        border-radius: 10px;
        background: #fff8e5;
        color: #5e4b00;
      }
    </style>
  </head>
  <body>
    <div class="notice">
      <strong>Observacao:</strong> este MVP e frontend-only (static export) e nao publica backend.
      A documentacao abaixo e um contrato tecnico para evolucao futura.
    </div>
    <div id="swagger-ui"></div>

    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
    <script>
      window.ui = SwaggerUIBundle({
        url: "./openapi.json",
        dom_id: "#swagger-ui",
        deepLinking: true,
        displayRequestDuration: true,
        docExpansion: "list",
        defaultModelsExpandDepth: -1,
        supportedSubmitMethods: []
      });
    </script>
  </body>
  </html>
